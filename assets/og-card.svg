<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- Black background -->
  <rect width="1200" height="630" fill="#1A1A1A"/>

  <!-- Orange top header band -->
  <rect width="1200" height="120" fill="#E8630A"/>

  <!-- White "IR" monogram in header -->
  <rect x="44" y="22" width="76" height="76" rx="8" fill="rgba(255,255,255,0.15)"/>
  <text x="82" y="78" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#FFFFFF" text-anchor="middle">IR</text>

  <!-- Brand name in header -->
  <text x="140" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" letter-spacing="1">ISSAC REALTY TEAM</text>
  <text x="140" y="86" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.75)" letter-spacing="0.5">Associates of Dreamhouse Realty Ltd., Calgary</text>

  <!-- REALTOR badge in header top right -->
  <rect x="1060" y="34" width="108" height="52" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="1114" y="58" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">REALTOR®</text>
  <text x="1114" y="76" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Licensed · RECA</text>

  <!-- Orange left accent stripe -->
  <rect x="0" y="120" width="6" height="510" fill="#E8630A"/>

  <!-- Main headline -->
  <text x="60" y="230" font-family="Arial Black, Arial, sans-serif" font-size="66" font-weight="900" fill="#FFFFFF">Start Your Calgary</text>
  <text x="60" y="308" font-family="Arial Black, Arial, sans-serif" font-size="66" font-weight="900" fill="#E8630A">Home Search</text>

  <!-- Divider -->
  <rect x="60" y="330" width="80" height="4" fill="#E8630A" rx="2"/>

  <!-- Subtext -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="26" fill="#CCCCCC">Complete your Buyer Intake in 5 minutes.</text>
  <text x="60" y="415" font-family="Arial, sans-serif" font-size="26" fill="#CCCCCC">Get your Welcome Package instantly.</text>

  <!-- Bottom dark strip -->
  <rect x="0" y="520" width="1200" height="110" fill="#111111"/>

  <!-- Agent name -->
  <text x="60" y="570" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#E8630A">Rosh Issac</text>
  <text x="60" y="598" font-family="Arial, sans-serif" font-size="15" fill="#888888">Realtor® · Issac Realty Team · Dreamhouse Realty Ltd., Calgary</text>

  <!-- URL pill -->
  <rect x="840" y="540" width="320" height="44" rx="22" fill="#E8630A"/>
  <text x="1000" y="568" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">buyer-intake-form.pages.dev</text>

</svg>
